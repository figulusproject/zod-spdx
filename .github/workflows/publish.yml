name: Publish to npm

# Triggered when the sync workflow pushes a version tag.
# Before this workflow will succeed, you must add an NPM_TOKEN secret in
# GitHub Settings → Secrets and variables → Actions → New repository secret.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
